<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AI Dashboard</p>
          <h1 id="machine-name">Loading…</h1>
          <p id="machine-meta" class="muted">Fetching machine profile</p>
        </div>
        <button id="refresh-button" class="secondary-button">Refresh</button>
      </header>

      <nav class="tab-bar" aria-label="Dashboard sections">
        <button class="tab-button active" data-tab="home">Home</button>
        <button class="tab-button" data-tab="services">Services</button>
        <button class="tab-button" data-tab="actions">Actions</button>
        <button class="tab-button" data-tab="logs">Logs</button>
        <button class="tab-button" data-tab="links">Links</button>
        <button class="tab-button" data-tab="about">About</button>
      </nav>

      <section id="status-banner" class="status-banner"></section>

      <section class="tab-panel active" data-panel="home">
        <div id="home-cards" class="card-grid"></div>
      </section>

      <section class="tab-panel" data-panel="services">
        <div id="services-list" class="stack"></div>
      </section>

      <section class="tab-panel" data-panel="actions">
        <div id="actions-list" class="stack"></div>
      </section>

      <section class="tab-panel" data-panel="logs">
        <div class="card">
          <label class="field">
            <span>Log source</span>
            <select id="log-selector"></select>
          </label>
          <div class="button-row">
            <button id="load-log-button" class="primary-button">Load log</button>
            <button id="copy-log-button" class="secondary-button">Copy</button>
          </div>
          <pre id="log-output" class="terminal-output empty">Select a log source to view output.</pre>
        </div>
      </section>

      <section class="tab-panel" data-panel="links">
        <div id="links-list" class="stack"></div>
      </section>

      <section class="tab-panel" data-panel="about">
        <div id="about-card" class="card"></div>
      </section>
    </main>

    <dialog id="command-dialog" class="command-dialog">
      <article class="dialog-card">
        <header class="dialog-header">
          <h2 id="dialog-title">Command output</h2>
          <button id="close-dialog" class="secondary-button">Close</button>
        </header>
        <p id="dialog-meta" class="muted"></p>
        <pre id="dialog-output" class="terminal-output"></pre>
      </article>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
